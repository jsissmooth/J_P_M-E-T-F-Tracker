name: Discover JPM API

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests playwright && playwright install chromium && playwright install-deps chromium
      - name: Run discovery
        run: python scripts/discover_api.py
